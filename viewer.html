<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Preview</title>
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; img-src 'self' data: file:; style-src 'self' 'unsafe-inline'; frame-src file:;" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f1f3f5;
    color: #1c1e21;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  #header {
    flex: 0 0 auto;
    height: 52px;
    background: #0084ff;
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
    -webkit-app-region: drag;
  }
  #title {
    flex: 1 1 auto;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .btn {
    -webkit-app-region: no-drag;
    background: rgba(255, 255, 255, 0.18);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.12s ease;
    white-space: nowrap;
  }
  .btn:hover { background: rgba(255, 255, 255, 0.3); }
  .btn:active { background: rgba(255, 255, 255, 0.12); }
  #content {
    flex: 1 1 auto;
    position: relative;
    overflow: auto;
    background: #f1f3f5;
  }
  #pdf-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  /* Word/document rendering */
  #doc {
    max-width: 760px;
    margin: 24px auto;
    padding: 56px 64px;
    background: #fff;
    box-shadow: 0 1px 6px rgba(0, 0, 0, 0.12);
    border-radius: 4px;
    line-height: 1.6;
    font-size: 15px;
  }
  #doc h1, #doc h2, #doc h3 { line-height: 1.3; }
  #doc img { max-width: 100%; height: auto; }
  #doc table { border-collapse: collapse; }
  #doc td, #doc th { border: 1px solid #d0d3d7; padding: 6px 10px; }
  #doc p { margin: 0 0 12px; }
  #message {
    max-width: 480px;
    margin: 80px auto;
    text-align: center;
    color: #65676b;
    font-size: 15px;
    line-height: 1.5;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div id="app">
    <div id="header">
      <span id="title">Attachment</span>
      <button class="btn" id="btn-external">Open in default app</button>
      <button class="btn" id="btn-save">Save a copy</button>
    </div>
    <div id="content">
      <iframe id="pdf-frame" class="hidden"></iframe>
      <div id="doc" class="hidden"></div>
      <div id="message" class="hidden"></div>
    </div>
  </div>
  <script src="viewer.js"></script>
</body>
</html>
